name: Codex Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, edited]

jobs:
  codex-review:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@codex review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@codex review')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '@codex review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Get PR branch info
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number ?? context.issue.number;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('pr_number', prNumber);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_ref', pr.data.base.ref);
            core.setOutput('head_ref', pr.data.head.ref);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.head_sha }}
          fetch-depth: 0

      - name: Post "reviewing" comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request?.number ?? context.issue.number,
              body: '🤖 **Codex** is reviewing this PR...',
            });

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Codex reads credentials from ~/.codex/auth.json, not the env var directly
          mkdir -p ~/.codex
          printf '{"auth_mode":"apikey","OPENAI_API_KEY":"%s"}' "$OPENAI_API_KEY" > ~/.codex/auth.json
          # Disable bubblewrap sandbox — not available on GitHub Actions runners
          printf '[sandbox]\ntype = "none"\n' >> ~/.codex/config.toml

          BASE=${{ steps.pr-info.outputs.base_ref }}
          git fetch origin "$BASE"

          # Capture output; codex review exits 0 on pass, non-zero on findings
          OUTPUT=$(codex review --base "origin/$BASE" -c 'model_reasoning_effort="high"' 2>&1) || true
          EXIT_CODE=$?

          # Determine gate
          if echo "$OUTPUT" | grep -q '\[P1\]'; then
            GATE="FAIL"
          else
            GATE="PASS"
          fi

          # Write to file to avoid shell escaping issues
          {
            echo "GATE=$GATE"
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

          # Save review body to a file for the comment step
          cat > /tmp/review-output.txt << 'REVIEW_EOF'
          $OUTPUT
          REVIEW_EOF
          # Re-do with actual variable expansion
          echo "$OUTPUT" > /tmp/review-output.txt
          echo "GATE=$GATE" >> /tmp/review-meta.txt

      - name: Post review results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/review-output.txt', 'utf8').trim();
            const gate = '${{ steps.review.outputs.GATE }}';
            const gateEmoji = gate === 'PASS' ? '✅' : '❌';

            const body = [
              `## 🤖 Codex Code Review — ${gateEmoji} ${gate}`,
              '',
              '```',
              output || '(no output)',
              '```',
              '',
              `*Triggered by @${context.actor} · [Run logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request?.number ?? context.issue.number,
              body,
            });
